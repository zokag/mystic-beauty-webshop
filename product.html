<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/style.css" type="text/css" />
    <!--Bootstrap css-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <link rel="icon" href="assets/img/favicon.ico" />

    <!--fontawsome-->
    <script src="https://kit.fontawesome.com/68cdbeed89.js" crossorigin="anonymous"></script>
    <title>Mystical Beauty</title>
  </head>
  <body>
    <header>
      <div
        id="header"
        class="container d-flex align-items-center justify-content-between"
      >
        <!-- LEVA STRANA -->
        <div class="header-left-side d-flex align-items-center">
          <div id="logo">
            <a href="index.html">
              Mystical <span class="span-primary">Beauty</span>
            </a>
          </div>

          <div id="nav">
            <ul class="navbar d-flex ps-0 mb-0"></ul>
          </div>
        </div>

        <!-- SREDINA -->
        <div id="header-center">
          <a href="#" id="dailyTip"></a>
          <button id="menu-toggle" type="button" class="ms-3">
        <i class="fa-solid fa-bars"></i>
      </button>
        </div>

        <!-- DESNA STRANA -->
        <div id="desno" class="d-flex align-items-center">
          <div class="header-cart d-flex align-items-center position-relative">
            <span
              class="cart-icon d-flex align-items-center justify-content-center position-relative"
            >
              <a href="cart.html">
                <i class="fa-thin fa-cart-shopping"></i>
              </a>
              <span class="cart-badge">0</span>
            </span>

            <span class="cart-text d-flex flex-column ms-2">
              <span class="products-count">Products</span>
              <span class="products-total"><strong>$0,00</strong></span>
            </span>
          </div>
          
        </div>
      </div>
    </header>

    <div id="oneProduct"></div>

    <footer id="footer" class="mt-5 d-flex justify-content-center">
      <div class="container">
        <div class="row align-items-center text-center text-lg-start gy-3">
          <div class="col-12 col-lg-4">
            <div class="footer-nav">
              <ul
                class="footer-navbar mb-0 ps-0 d-flex flex-wrap justify-content-center justify-content-lg-start"
              ></ul>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="flex-column">
              <div id="link-to-center" class="text-center">
                <a href="#" target="_blank">Documentation</a>
              </div>
              <div class="copy">
                <p class="mb-0">
                  Copyright &copy; 2026 Mystical Beauty. All Rights Reserved.
                </p>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div
              id="socialIcons"
              class="d-flex justify-content-center justify-content-lg-end"
            ></div>
          </div>
        </div>
      </div>
    </footer>

    <!--jquery-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!--Bootstrap js-->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
      integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
      crossorigin="anonymous"
    ></script>
    <!--JS-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="assets/js/main.js" type="text/javascript"></script>

</html>
