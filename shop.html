<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="keywords"
      content="shop beauty products, skincare shop, makeup shop, cosmetics online, Mystical Beauty store"
    />
    <meta
      name="description"
      content="Browse our wide range of skicare and makeup products. Find your perfect beauty match and enhance your natural glow with Mystical Beauty."
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="author" content="Zorka Grčić 53/22" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/style.css" type="text/css" />
    <!--Bootstrap css-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <link rel="icon" href="./assets/img/favicon.ico?v=1" />

    <!--fontawsome-->
    <script
      src="https://kit.fontawesome.com/68cdbeed89.js"
      crossorigin="anonymous"
    ></script>
    <title>Shop | Mystical Beauty Beauty Products</title>
  </head>
  <body>
    <!--header-->
    <header>
      <div
        id="header"
        class="container d-flex align-items-center justify-content-between"
      >
        <!-- LEVA STRANA -->
        <div class="header-left-side d-flex align-items-center">
          <div id="logo">
            <a href="index.html">
              Mystical <span class="span-primary">Beauty</span>
            </a>
          </div>

          <div id="nav">
            <ul class="navbar d-flex ps-0 mb-0"></ul>
          </div>
        </div>

        <!-- SREDINA -->
        <div id="header-center">
          <a href="#" id="dailyTip"></a>
          <button id="menu-toggle" type="button" class="ms-3">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>

        <!-- DESNA STRANA -->
        <div id="desno" class="d-flex align-items-center">
          <div class="header-cart d-flex align-items-center position-relative">
            <span
              class="cart-icon d-flex align-items-center justify-content-center position-relative"
            >
              <a href="cart.html">
                <i class="fa-solid fa-cart-arrow-down"></i>
              </a>
              <span class="cart-badge">0</span>
            </span>

            <span class="cart-text d-flex flex-column ms-2">
              <span class="products-count">Products</span>
              <span class="products-total"><strong>$0,00</strong></span>
            </span>
          </div>
        </div>
      </div>
    </header>

    <div class="container all-products mt-5">
      <div class="row g-4">
        <div class="col-12 col-lg-3">
          <img src="assets/img/shopping.png" class="img-fluid" alt="shopping cart">
          <div class="filters p-3">
            
            <div class="filter-group mb-4">
              <label for="searchInput" class="form-label">Search</label>
              <div class="searchInput border d-flex align-items-center">
                <input
                  type="text"
                  class="border-0 form-control"
                  id="searchInput"
                  placeholder="Search by name..."
                />
              </div>
            </div>
            <div class="filter-group mb-4">
              <label for="sortSelect" class="form-label">Sort by</label>
              <select id="sortSelect" class="form-select">
                <option value="0">Default</option>
                <option value="priceAsc">Price: Low to High</option>
                <option value="priceDesc">Price: High to Low</option>
                <option value="mostReviews">Most Reviews</option>
                <option value="ratingAsc">Rating: Low to High</option>
                <option value="ratingDesc">Rating: High to Low</option>
              </select>
            </div>

            <div class="filter-group mb-4">
              <label for="categoryFilter" class="form-label">Category</label>
              <select id="categoryFilter" class="form-select"></select>
            </div>

            <div class="filter-group mb-4">
              <label
                for="subcategoryFilter"
                id="subcategoryLabel"
                class="form-label"
                >Subcategory</label
              >
              <div id="subcategoryFilter" class="form-chb"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-9">
          <div
            class="top-bar d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4"
          >
            <h2 class="shop-title mb-0">Our Products</h2>
            <p class="product-count mb-0"></p>
          </div>

          <div class="shopProducts row g-4"></div>
          <div id="noResults" class="ms-1 mt-2">No products found</div>
          <div id="pagination" class="d-flex justify-content-start mt-4"></div>
        </div>
      </div>
    </div>
    <div id="toast-container"></div>
    <footer id="footer" class="mt-5 py-4">
      <div class="container">
        <div class="row align-items-center text-center text-lg-start gy-4">
          <div class="col-12 col-lg-4">
            <div class="footer-nav">
              <h6 class="mb-3 ps-2">Quick Links</h6>
              <ul
                class="footer-navbar mb-0 ps-0 d-flex flex-wrap justify-content-center justify-content-lg-start"
              ></ul>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="text-center">
              <h6 class="mb-3">About</h6>
              <p class="small text-muted mb-2">
                Discover beauty, self-care, and your everyday glow with Mystical
                Beauty.
              </p>

              <hr />
              <a href="documentation.pdf" target="_blank">
                <i class="fa-solid fa-file-lines me-1"></i> Documentation
              </a>
              <div class="copy">
                <p class="mb-0 mt-2">
                  Copyright &copy; <span id="year"></span> Mystical Beauty. All Rights Reserved.
                </p>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="text-center text-lg-end">
              <h6 class="mb-3">Follow Us</h6>
              <div
                id="socialIcons"
                class="d-flex justify-content-center justify-content-lg-end gap-3"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </footer>
    <!--jquery-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!--Bootstrap js-->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
      integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
      crossorigin="anonymous"
    ></script>
    <!--JS-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="assets/js/main.js" type="text/javascript"></script>
  </body>
</html>
